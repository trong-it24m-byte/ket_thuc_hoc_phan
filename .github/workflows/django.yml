name: Django CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint Django project (basic check)
        run: |
          if [ -f manage.py ]; then
            python manage.py check --deploy --fail-level WARNING || python manage.py check
          else
            echo "manage.py not found, skipping Django check"
          fi

      - name: Run tests
        run: |
          if [ -f manage.py ]; then
            python manage.py test
          else
            echo "manage.py not found, skipping tests"
          fi
