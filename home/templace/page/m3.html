<h2>⚙️ Module 3 - Cài Đặt</h2>
<p>Đây là nội dung của Module 3 - Các tùy chọn cài đặt và cấu hình.</p>
<div class="card mt-3">
    <div class="card-header bg-secondary text-white">
        <h5 class="mb-0">Cài Đặt Hệ Thống</h5>
    </div>
    <div class="card-body">
        <form>
            <div class="mb-3">
                <label class="form-label">📝 Tên ứng dụng</label>
                <input type="text" class="form-control" value="ứng dụng web của tôi" />
            </div>
            <div class="mb-3">
                <label class="form-label">🌐 Tên miền</label>
                <input type="text" class="form-control" value="example.com" />
            </div>
            <div class="mb-3">
                <label class="form-label">🔔 Bật thông báo</label>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="notificationCheck" checked />
                    <label class="form-check-label" for="notificationCheck">
                        Bật thông báo email
                    </label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">💾 Lưu cài đặt</button>
        </form>
    </div>
</div>
<div class="alert alert-warning mt-3">
    <strong>⚠️ Lưu ý:</strong> Các thay đổi sẽ có hiệu lực ngay sau khi bạn lưu.
</div>
