{% extends "pages/base.html" %}

{% block title %}Đăng ký tài khoản{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; color: #667eea; margin-bottom: 20px;">Đăng ký tài khoản</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="width: 100%; padding: 10px; background-color: #0d6efd; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Đăng ký</button>
    </form>
</div>
{% endblock %}
